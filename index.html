<!DOCTYPE html>
<html lang="lt">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#070B16">
<title>Zenitas — stebėjimų planavimas ir žurnalas</title>
<link rel="manifest" href="manifest.webmanifest">
<link rel="icon" href="icon-192.png">
<link rel="apple-touch-icon" href="icon-192.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&family=IBM+Plex+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#070B16; --panel:#0E1525; --panel2:#16203A; --line:#22304F; --line2:#2E3F66;
  --ink:#E9EDF8; --mut:#94A1C3; --dim:#5F6C8E;
  --gold:#F2C879; --acc:#8FB8E8; --good:#63C98B; --warn:#E5B45C; --poor:#E08A52; --bad:#DB6470;
  --r:14px;
  font-size:16px;
}
*{box-sizing:border-box; -webkit-tap-highlight-color:transparent}
html,body{margin:0;padding:0;background:var(--bg);color:var(--ink);
  font-family:'IBM Plex Sans',system-ui,sans-serif; min-height:100%;}
html.red{filter:grayscale(1) sepia(1) hue-rotate(-50deg) saturate(5) brightness(.8);}
h1,h2,h3,.disp{font-family:'Space Grotesk','IBM Plex Sans',sans-serif; letter-spacing:.01em;}
button{font-family:inherit;color:inherit;background:none;border:none;cursor:pointer}
input,select,textarea{font-family:inherit;font-size:1rem;color:var(--ink);background:var(--panel2);
  border:1px solid var(--line2);border-radius:10px;padding:.55rem .7rem;width:100%;}
input:focus,select:focus,textarea:focus,button:focus-visible{outline:2px solid var(--acc);outline-offset:1px}
label{font-size:.8rem;color:var(--mut);display:block;margin:.6rem 0 .25rem}
a{color:var(--acc)}

#app{max-width:760px;margin:0 auto;padding:0 .9rem 5.5rem;}
header.top{display:flex;align-items:center;gap:.6rem;padding:.8rem 0 .5rem;position:sticky;top:0;
  background:linear-gradient(var(--bg) 78%,transparent);z-index:30;}
header.top h1{font-size:1.25rem;margin:0;font-weight:700;}
header.top h1 span{color:var(--gold)}
.loc-chip{margin-left:auto;display:flex;align-items:center;gap:.35rem;background:var(--panel);
  border:1px solid var(--line);border-radius:999px;padding:.35rem .7rem;font-size:.8rem;color:var(--mut);max-width:46%;}
.loc-chip b{color:var(--ink);font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.iconbtn{width:38px;height:38px;border-radius:10px;border:1px solid var(--line);background:var(--panel);
  display:flex;align-items:center;justify-content:center;font-size:1.05rem;flex:none}
.iconbtn.on{border-color:var(--bad);color:var(--bad)}

nav.tabs{position:fixed;bottom:0;left:0;right:0;z-index:40;background:rgba(10,15,28,.96);
  border-top:1px solid var(--line);backdrop-filter:blur(8px);
  padding:.3rem max(.4rem,env(safe-area-inset-left)) max(.45rem,env(safe-area-inset-bottom));}
nav.tabs .row{max-width:760px;margin:0 auto;display:grid;grid-template-columns:repeat(5,1fr);}
nav.tabs button{display:flex;flex-direction:column;align-items:center;gap:2px;padding:.35rem 0;
  font-size:.66rem;color:var(--dim);border-radius:10px;}
nav.tabs button .i{font-size:1.15rem;line-height:1}
nav.tabs button.act{color:var(--gold)}

.view{display:none;animation:fade .18s ease}
.view.act{display:block}
@keyframes fade{from{opacity:0;transform:translateY(4px)}to{opacity:1}}
@media (prefers-reduced-motion:reduce){.view.act{animation:none}}

.card{background:var(--panel);border:1px solid var(--line);border-radius:var(--r);padding:.9rem;margin:.7rem 0;}
.card h2{font-size:.95rem;margin:0 0 .6rem;display:flex;align-items:center;gap:.45rem;}
.obj-main .t .alt{font-size:.68rem;color:var(--dim);font-weight:400;font-family:'IBM Plex Sans'}
.card h2 .sub{margin-left:auto;font-size:.72rem;color:var(--dim);font-weight:400;font-family:'IBM Plex Sans'}
.eyebrow{font-size:.68rem;letter-spacing:.14em;text-transform:uppercase;color:var(--dim);margin:0 0 .2rem}
.muted{color:var(--mut);font-size:.85rem}
.small{font-size:.78rem}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:.55rem}
.grid3{display:grid;grid-template-columns:repeat(3,1fr);gap:.55rem}
.stat{background:var(--panel2);border-radius:10px;padding:.5rem .6rem}
.stat .v{font-size:1.05rem;font-weight:600;font-family:'Space Grotesk'}
.stat .k{font-size:.68rem;color:var(--mut);margin-top:.1rem}
.btn{display:inline-flex;align-items:center;justify-content:center;gap:.4rem;background:var(--panel2);
  border:1px solid var(--line2);border-radius:10px;padding:.55rem .9rem;font-size:.88rem;font-weight:500}
.btn.primary{background:var(--gold);color:#1A1404;border-color:var(--gold);font-weight:600}
.btn.danger{border-color:var(--bad);color:var(--bad)}
.btn.sm{padding:.3rem .6rem;font-size:.76rem;border-radius:8px}
.btn:disabled{opacity:.45;cursor:default}
.btnrow{display:flex;gap:.5rem;flex-wrap:wrap;margin-top:.6rem}

.badge{display:inline-block;font-size:.66rem;font-weight:600;border-radius:6px;padding:.12rem .42rem;letter-spacing:.02em}
.b-ideal{background:rgba(99,201,139,.16);color:var(--good)}
.b-part{background:rgba(229,180,92,.16);color:var(--warn)}
.b-poor{background:rgba(224,138,82,.16);color:var(--poor)}
.b-bad{background:rgba(219,100,112,.16);color:var(--bad)}
.b-none{background:rgba(148,161,195,.14);color:var(--mut)}
.b-gold{background:rgba(242,200,121,.18);color:var(--gold)}
.b-acc{background:rgba(143,184,232,.16);color:var(--acc)}

/* Calendar */
.cal-head{display:flex;align-items:center;gap:.6rem;margin:.4rem 0}
.cal-head h2{margin:0;font-size:1rem}
.legend{display:flex;gap:.8rem;flex-wrap:wrap;font-size:.7rem;color:var(--mut);margin:.4rem 0 .6rem}
.legend i{display:inline-block;width:.7rem;height:.7rem;border-radius:3px;margin-right:.3rem;vertical-align:-1px}
.cal{display:grid;grid-template-columns:repeat(7,1fr);gap:4px}
.cal .dow{text-align:center;font-size:.62rem;color:var(--dim);padding:.2rem 0}
.cal .day{background:var(--panel);border:1px solid var(--line);border-radius:9px;padding:.3rem .25rem .35rem;
  min-height:58px;display:flex;flex-direction:column;gap:3px;cursor:pointer;position:relative}
.cal .day.out{opacity:.32}
.cal .day.today{border-color:var(--gold)}
.cal .day .d{font-size:.72rem;font-weight:600;display:flex;justify-content:space-between;align-items:center}
.cal .day .moon{font-size:.62rem;color:var(--mut)}
.cal .day .qdot{width:7px;height:7px;border-radius:50%}
.q-ideal{background:var(--good)} .q-part{background:var(--warn)} .q-poor{background:var(--poor)}
.q-bad{background:var(--bad)} .q-none{background:var(--dim)}
.nightbar{height:7px;border-radius:4px;background:#0A101F;position:relative;overflow:hidden;border:1px solid #1B2742}
.nightbar .dark{position:absolute;top:0;bottom:0;background:#27406B}
.nightbar .free{position:absolute;top:0;bottom:0;background:var(--good)}
.nightbar .moonseg{position:absolute;top:0;bottom:0;background:rgba(229,180,92,.85)}

/* lists */
.obj-row{display:flex;gap:.7rem;align-items:center;padding:.6rem .2rem;border-bottom:1px solid var(--line);cursor:pointer}
.obj-row:last-child{border-bottom:none}
.obj-ico{width:38px;height:38px;border-radius:10px;background:var(--panel2);display:flex;align-items:center;
  justify-content:center;font-family:'Space Grotesk';font-weight:700;font-size:.72rem;color:var(--acc);flex:none;text-align:center}
.obj-main{flex:1;min-width:0}
.obj-main .t{font-weight:600;font-size:.92rem;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.obj-main .s{font-size:.74rem;color:var(--mut);margin-top:1px}
.obj-side{text-align:right;font-size:.74rem;color:var(--mut);flex:none}
.stars{color:var(--gold);letter-spacing:.06em}

.filters{display:flex;gap:.45rem;flex-wrap:wrap;margin:.5rem 0}
.filters select,.filters input{width:auto;flex:1;min-width:104px;font-size:.82rem;padding:.4rem .5rem}
.chips{display:flex;gap:.4rem;overflow-x:auto;padding-bottom:.2rem}
.chip{flex:none;border:1px solid var(--line2);border-radius:999px;padding:.3rem .75rem;font-size:.78rem;color:var(--mut)}
.chip.on{border-color:var(--gold);color:var(--gold)}

/* sky chart */
#skywrap{position:relative;border-radius:var(--r);overflow:hidden;border:1px solid var(--line);background:#04060D;touch-action:none}
#sky{display:block;width:100%}
#skyhud{position:absolute;left:.5rem;right:.5rem;bottom:.5rem;display:flex;flex-direction:column;gap:.3rem;
  background:rgba(7,11,22,.82);border:1px solid var(--line);border-radius:10px;padding:.35rem .5rem}
#skyhud .hudrow{display:flex;gap:.4rem;align-items:center}
#skyhud .hudlab{font-size:.7rem;color:var(--mut);flex:none}
#skyhud button.on{border-color:#FF5252;color:#FF7B7B}
#skyhud input[type=range]{flex:1;accent-color:var(--gold);background:none;border:none;padding:0}
#skytime{font-size:.74rem;color:var(--gold);font-family:'Space Grotesk';min-width:84px;text-align:center}
#skymsg{position:absolute;top:.5rem;left:.5rem;right:.5rem;font-size:.74rem;color:var(--mut);
  background:rgba(7,11,22,.8);border-radius:8px;padding:.3rem .5rem;display:none}
#skyinfo{position:absolute;top:.5rem;left:.5rem;max-width:75%;display:none;z-index:5;
  background:rgba(10,16,30,.92);border:1px solid var(--line2);border-radius:12px;padding:.55rem .7rem;
  box-shadow:0 4px 18px rgba(0,0,0,.45)}
#skyinfo .t{font-family:'Space Grotesk';font-weight:600;font-size:.92rem;padding-right:1.4rem}
#skyinfo .s{font-size:.74rem;color:var(--mut);margin-top:2px}
#skyinfo .b{display:flex;gap:.4rem;margin-top:.5rem}
#skyinfo .x{position:absolute;top:.3rem;right:.45rem;color:var(--mut);font-size:1rem;padding:.15rem}
#skylayers{position:absolute;top:.5rem;right:.5rem;display:none;z-index:6;max-height:70%;overflow-y:auto;
  background:rgba(10,16,30,.94);border:1px solid var(--line2);border-radius:12px;padding:.6rem .75rem;
  box-shadow:0 4px 18px rgba(0,0,0,.45);min-width:11.5rem}
#skylayers h4{margin:.2rem 0 .3rem;font-size:.72rem;letter-spacing:.1em;text-transform:uppercase;color:var(--dim)}
#skylayers label{display:flex;align-items:center;gap:.45rem;font-size:.8rem;padding:.15rem 0}
#skylayers input{width:auto;accent-color:var(--gold)}

/* modal */
.modal{position:fixed;inset:0;z-index:60;display:none;align-items:flex-end;justify-content:center;
  background:rgba(3,5,11,.66)}
.modal.act{display:flex}
.sheet{background:var(--panel);border:1px solid var(--line2);border-bottom:none;border-radius:18px 18px 0 0;
  width:100%;max-width:760px;max-height:88vh;overflow-y:auto;padding:1rem 1rem 1.4rem;animation:up .2s ease}
@keyframes up{from{transform:translateY(30px);opacity:.4}to{transform:none;opacity:1}}
@media (prefers-reduced-motion:reduce){.sheet{animation:none}}
.sheet h2{margin:.1rem 0 .2rem;font-size:1.15rem}
.sheet .x{position:sticky;top:0;float:right;font-size:1.2rem;color:var(--mut);padding:.2rem .5rem}
.kv{display:grid;grid-template-columns:auto 1fr;gap:.25rem .8rem;font-size:.84rem;margin:.6rem 0}
.kv b{color:var(--mut);font-weight:500}
.rate{display:flex;gap:.3rem;font-size:1.6rem}
.rate button{color:var(--dim)} .rate button.on{color:var(--gold)}
.photo-thumbs{display:flex;gap:.5rem;flex-wrap:wrap;margin-top:.5rem}
.photo-thumbs img{width:84px;height:84px;object-fit:cover;border-radius:10px;border:1px solid var(--line2)}
.toast{position:fixed;bottom:5.4rem;left:50%;transform:translateX(-50%);background:var(--panel2);
  border:1px solid var(--line2);border-radius:10px;padding:.55rem .9rem;font-size:.84rem;z-index:80;
  max-width:90%;box-shadow:0 6px 24px rgba(0,0,0,.5);display:none}
.session-banner{position:sticky;top:3.3rem;z-index:25;background:linear-gradient(135deg,#1A2742,#142036);
  border:1px solid var(--line2);border-radius:12px;padding:.55rem .8rem;display:none;align-items:center;gap:.6rem;font-size:.82rem}
.session-banner .pulse{width:9px;height:9px;border-radius:50%;background:var(--bad);animation:pl 1.6s infinite}
.session-banner.act{display:flex}
.inp{width:100%;background:var(--panel2);border:1px solid var(--line2);border-radius:10px;color:var(--ink);
  padding:.55rem .7rem;font-size:.88rem;font-family:inherit;margin-top:.25rem}
.inp:focus{outline:none;border-color:var(--gold)}
#enStars span{font-size:1.7rem;cursor:pointer;padding:0 .12rem;user-select:none}
@keyframes pl{50%{opacity:.3}}
.hr{border:none;border-top:1px solid var(--line);margin:.8rem 0}
.alertbox{border-left:3px solid var(--gold);background:var(--panel2);border-radius:0 10px 10px 0;
  padding:.6rem .8rem;font-size:.85rem;margin:.6rem 0}
.windows{display:flex;flex-direction:column;gap:.3rem;font-size:.82rem}
.winrow{display:flex;align-items:center;gap:.5rem}
.winrow .bar{flex:1}
table.wx{width:100%;border-collapse:collapse;font-size:.76rem}
table.wx th{color:var(--dim);font-weight:500;text-align:left;padding:.3rem .35rem;border-bottom:1px solid var(--line)}
table.wx td{padding:.32rem .35rem;border-bottom:1px solid var(--line)}
.cl{display:inline-block;width:2rem;text-align:center;border-radius:5px;padding:.08rem 0;font-weight:600}
.empty{padding:1.4rem .6rem;text-align:center;color:var(--dim);font-size:.85rem}
</style>
</head>
<body>
<div id="app">
  <header class="top">
    <h1>Zen<span>·</span>itas</h1>
    <div class="loc-chip" id="locChip" role="button" tabindex="0">📍 <b id="locName">Vilnius</b></div>
    <button class="iconbtn" id="redBtn" title="Naktinis (raudonas) režimas">🔴</button>
    <button class="iconbtn" id="setBtn" title="Nustatymai">⚙️</button>
  </header>

  <div class="session-banner" id="sessBanner">
    <span class="pulse"></span>
    <span id="sessInfo" style="flex:1">Vyksta stebėjimo sesija</span>
    <button class="btn sm" id="sessGoto">Atidaryti</button>
  </div>

  <main>
    <section class="view act" id="v-tonight"></section>
    <section class="view" id="v-cal"></section>
    <section class="view" id="v-sky">
      <div id="skywrap">
        <canvas id="sky"></canvas>
        <div id="skymsg"></div>
        <div id="skyinfo"></div>
        <div id="skylayers"></div>
        <div id="skyhud">
          <div class="hudrow">
            <button class="btn sm" id="skyAll" title="Visas dangus">⛶</button>
            <button class="btn sm" id="skyNow">Dabar</button>
            <input type="range" id="skySlider" min="-720" max="720" step="10" value="0" aria-label="Laiko poslinkis">
            <span id="skytime">—</span>
          </div>
          <div class="hudrow">
            <button class="btn sm" id="skyTelrad" title="Telrad ieškiklis">◎ Telrad</button>
            <button class="btn sm" id="skyLayers" title="Sluoksniai">◧</button>
            <span class="hudlab" title="Žvaigždžių kiekis">✦</span>
            <input type="range" id="skyStarBoost" min="0" max="2.5" step="0.1" value="0" aria-label="Žvaigždžių kiekis">
            <span class="hudlab">✦✦</span>
          </div>
        </div>
      </div>
      <p class="small muted" style="margin:.5rem .2rem">Vilkite — sukti, žnybkite / ratukas — mastelis, bakstelėkite objektą — informacija. Geltona linija — ekliptika.</p>
    </section>
    <section class="view" id="v-cat"></section>
    <section class="view" id="v-log"></section>
  </main>
</div>

<nav class="tabs"><div class="row">
  <button data-v="v-tonight" class="act"><span class="i">✦</span>Šįvakar</button>
  <button data-v="v-cal"><span class="i">▦</span>Kalendorius</button>
  <button data-v="v-sky"><span class="i">⊕</span>Dangus</button>
  <button data-v="v-cat"><span class="i">≡</span>Katalogas</button>
  <button data-v="v-log"><span class="i">✎</span>Žurnalas</button>
</div></nav>

<div class="modal" id="modal"><div class="sheet" id="sheet"></div></div>
<div class="toast" id="toast"></div>
<script>
"use strict";
/* ============ SAUGYKLA (window.storage -> localStorage -> atmintis) ============ */
const Store=(()=>{
  const mem={};
  const hasWS=typeof window!=='undefined'&&window.storage&&window.storage.get;
  let hasLS=false; try{localStorage.setItem('__t','1');localStorage.removeItem('__t');hasLS=true;}catch(e){}
  return {
    mode: hasWS?'cloud':(hasLS?'local':'mem'),
    async get(k){ try{
      if(hasWS){const r=await window.storage.get(k);return r?JSON.parse(r.value):null;}
      if(hasLS){const v=localStorage.getItem('z:'+k);return v?JSON.parse(v):null;}
      return mem[k]??null;
    }catch(e){return null;} },
    async set(k,v){ try{
      const s=JSON.stringify(v);
      if(hasWS){await window.storage.set(k,s);return true;}
      if(hasLS){localStorage.setItem('z:'+k,s);return true;}
      mem[k]=v;return true;
    }catch(e){toast('Nepavyko išsaugoti (pilna saugykla?)');return false;} },
    async del(k){ try{
      if(hasWS){await window.storage.delete(k);}else if(hasLS){localStorage.removeItem('z:'+k);}else delete mem[k];
    }catch(e){} },
    async list(p){ try{
      if(hasWS){const r=await window.storage.list(p);return r?r.keys:[];}
      if(hasLS){const out=[];for(let i=0;i<localStorage.length;i++){const k=localStorage.key(i);
        if(k.startsWith('z:'+p))out.push(k.slice(2));}return out;}
      return Object.keys(mem).filter(k=>k.startsWith(p));
    }catch(e){return [];} }
  };
})();

/* ============ ASTRONOMIJA ============ */
const RAD=Math.PI/180, DEG=180/Math.PI, TAU=Math.PI*2, DAYMS=86400000;
const toDays=date=>date.getTime()/DAYMS-0.5+2440588-2451545;
const norm=a=>((a%TAU)+TAU)%TAU;
function eclToEq(l,b){const e=RAD*23.4397;
  return {ra:norm(Math.atan2(Math.sin(l)*Math.cos(e)-Math.tan(b)*Math.sin(e),Math.cos(l))),
          dec:Math.asin(Math.sin(b)*Math.cos(e)+Math.cos(b)*Math.sin(e)*Math.sin(l))};}
function sunCoords(d){const M=RAD*(357.5291+0.98560028*d);
  const C=RAD*(1.9148*Math.sin(M)+0.02*Math.sin(2*M)+0.0003*Math.sin(3*M));
  const L=M+C+RAD*102.9372+Math.PI; return Object.assign(eclToEq(L,0),{L});}
function moonCoords(d){const L=RAD*(218.316+13.176396*d),M=RAD*(134.963+13.064993*d),F=RAD*(93.272+13.229350*d);
  const l=L+RAD*6.289*Math.sin(M), b=RAD*5.128*Math.sin(F), dist=385001-20905*Math.cos(M);
  return Object.assign(eclToEq(l,b),{dist});}
function sidereal(d,lon){return norm(RAD*(280.16+360.9856235*d)+lon*RAD);}
function altazFromRaDec(ra,dec,date,lat,lon){
  const d=toDays(date), H=sidereal(d,lon)-ra, phi=lat*RAD;
  const alt=Math.asin(Math.sin(phi)*Math.sin(dec)+Math.cos(phi)*Math.cos(dec)*Math.cos(H));
  const az=norm(Math.atan2(Math.sin(H),Math.cos(H)*Math.sin(phi)-Math.tan(dec)*Math.cos(phi))+Math.PI);
  return {alt,az};}
const sunAlt=(t,lat,lon)=>{const d=toDays(t),c=sunCoords(d);return altazFromRaDec(c.ra,c.dec,t,lat,lon).alt;};
const moonAlt=(t,lat,lon)=>{const d=toDays(t),c=moonCoords(d);return altazFromRaDec(c.ra,c.dec,t,lat,lon).alt;};
function moonIllum(date){const d=toDays(date),s=sunCoords(d),m=moonCoords(d),sd=149598000;
  const phi=Math.acos(Math.sin(s.dec)*Math.sin(m.dec)+Math.cos(s.dec)*Math.cos(m.dec)*Math.cos(s.ra-m.ra));
  const inc=Math.atan2(sd*Math.sin(phi),m.dist-sd*Math.cos(phi));
  const ang=Math.atan2(Math.cos(s.dec)*Math.sin(s.ra-m.ra),
    Math.sin(s.dec)*Math.cos(m.dec)-Math.cos(s.dec)*Math.sin(m.dec)*Math.cos(s.ra-m.ra));
  return {fraction:(1+Math.cos(inc))/2, phase:0.5+0.5*inc*Math.sign(ang)/Math.PI};}
function moonPhaseName(p){ // p 0..1, 0=jaunatis
  if(p<0.0185||p>0.9815)return 'Jaunatis';
  if(p<0.2315)return 'Augantis pjautuvas';
  if(p<0.2685)return 'Priešpilnis (I ketv.)';
  if(p<0.4815)return 'Augantis Mėnulis';
  if(p<0.5185)return 'Pilnatis';
  if(p<0.7315)return 'Dylantis Mėnulis';
  if(p<0.7685)return 'Delčia (III ketv.)';
  return 'Dylantis pjautuvas';}
function moonEmoji(p){const e=['🌑','🌒','🌓','🌔','🌕','🌖','🌗','🌘'];return e[Math.floor(((p%1)*8)+0.5)%8];}

/* Kirtimų paieška: grąžina laikus, kai f(t) kerta slenkstį */
function crossings(t0,t1,stepMin,fn,thr){
  const ups=[],downs=[]; let prev=fn(t0)-thr, pt=t0;
  for(let t=t0.getTime()+stepMin*60000;t<=t1.getTime();t+=stepMin*60000){
    const tt=new Date(t), cur=fn(tt)-thr;
    if(prev<=0&&cur>0){const f=prev/(prev-cur);ups.push(new Date(pt.getTime()+f*(t-pt.getTime())));}
    if(prev>=0&&cur<0){const f=prev/(prev-cur);downs.push(new Date(pt.getTime()+f*(t-pt.getTime())));}
    prev=cur;pt=tt;}
  return {ups,downs};}

function planetRaDec(p,date){
  const d=toDays(date)+1.5; // Schlyter epocha 2451543.5
  const [N0,Nd,i0,id_,w0,wd,a0,ad,e0,ed,M0,Md]=p.el;
  const N=RAD*(N0+Nd*d), i=RAD*(i0+id_*d), w=RAD*(w0+wd*d), a=a0+ad*d, e=e0+ed*d;
  let M=norm(RAD*(M0+Md*d));
  let E=M+e*Math.sin(M)*(1+e*Math.cos(M));
  for(let k=0;k<6;k++){E=E-(E-e*Math.sin(E)-M)/(1-e*Math.cos(E));}
  const xv=a*(Math.cos(E)-e), yv=a*Math.sqrt(1-e*e)*Math.sin(E);
  const v=Math.atan2(yv,xv), r=Math.hypot(xv,yv);
  const xh=r*(Math.cos(N)*Math.cos(v+w)-Math.sin(N)*Math.sin(v+w)*Math.cos(i));
  const yh=r*(Math.sin(N)*Math.cos(v+w)+Math.cos(N)*Math.sin(v+w)*Math.cos(i));
  const zh=r*Math.sin(v+w)*Math.sin(i);
  // Saulė
  const ws=RAD*(282.9404+4.70935e-5*d), es=0.016709-1.151e-9*d, Ms=norm(RAD*(356.0470+0.9856002585*d));
  const Es=Ms+es*Math.sin(Ms)*(1+es*Math.cos(Ms));
  const xs0=Math.cos(Es)-es, ys0=Math.sqrt(1-es*es)*Math.sin(Es);
  const vs=Math.atan2(ys0,xs0), rs=Math.hypot(xs0,ys0), ls=vs+ws;
  const xg=xh+rs*Math.cos(ls), yg=yh+rs*Math.sin(ls), zg=zh;
  const ecl=RAD*(23.4393-3.563e-7*d);
  const xe=xg, ye=yg*Math.cos(ecl)-zg*Math.sin(ecl), ze=yg*Math.sin(ecl)+zg*Math.cos(ecl);
  const ra=norm(Math.atan2(ye,xe)), dec=Math.atan2(ze,Math.hypot(xe,ye));
  const dist=Math.hypot(xg,yg,zg);
  const mag=Math.round((p.m0+5*Math.log10(Math.max(.05,r*dist)))*10)/10;
  return {ra,dec,mag,dist};}

const esc=s=>String(s??'').replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));

/* Vienos nakties (prasidedančios datą D) analizė */
function nightInfo(dateNoon,lat,lon){
  const t0=new Date(dateNoon); t0.setHours(12,0,0,0);
  const t1=new Date(t0.getTime()+DAYMS);
  const f=t=>sunAlt(t,lat,lon)*DEG;
  let thr=-18, kind='astro';
  let c=crossings(t0,t1,6,f,thr);
  if(!c.downs.length||!c.ups.length){thr=-12;kind='naut';c=crossings(t0,t1,6,f,thr);}
  if(!c.downs.length||!c.ups.length){
    const cs=crossings(t0,t1,6,f,-0.833);
    return {date:t0,kind:'none',sunset:cs.downs[0]||null,sunrise:cs.ups[0]||null,
      darkStart:null,darkEnd:null,illum:moonIllum(new Date(t0.getTime()+DAYMS/2)).fraction,
      phase:moonIllum(new Date(t0.getTime()+DAYMS/2)).phase,freeWins:[],moonWins:[],freeH:0,cls:'none'};}
  const darkStart=c.downs[0], darkEnd=c.ups.find(u=>u>darkStart)||t1;
  const cs=crossings(t0,t1,6,f,-0.833);
  const mid=new Date((darkStart.getTime()+darkEnd.getTime())/2);
  const il=moonIllum(mid);
  // Mėnulio buvimo segmentai tamsos lange
  const step=5*60000, freeWins=[], moonWins=[];
  let cur=null, curM=null;
  for(let t=darkStart.getTime();t<=darkEnd.getTime();t+=step){
    const up=moonAlt(new Date(t),lat,lon)>-0.005;
    if(!up){ if(!cur)cur={a:t}; cur.b=t; if(curM){moonWins.push(curM);curM=null;} }
    else { if(!curM)curM={a:t}; curM.b=t; if(cur){freeWins.push(cur);cur=null;} }
  }
  if(cur)freeWins.push(cur); if(curM)moonWins.push(curM);
  const freeH=freeWins.reduce((s,w)=>s+(w.b-w.a),0)/3600000;
  const darkH=(darkEnd-darkStart)/3600000;
  const dim=il.fraction<=0.20;
  let cls;
  if(dim&&darkH>=1.5) cls='ideal';
  else if(freeH>=2.5) cls='ideal';
  else if(freeH>=1||(dim&&darkH>=0.7)) cls='part';
  else if(freeH>=0.4) cls='poor';
  else cls='bad';
  if(kind==='naut'&&cls==='ideal') cls='part';
  // Mėnulio patekėjimas/nusileidimas per parą
  const mf=t=>moonAlt(t,lat,lon)*DEG;
  const mc=crossings(t0,t1,6,mf,0.125);
  return {date:t0,kind,sunset:cs.downs[0]||null,sunrise:cs.ups[0]||null,darkStart,darkEnd,darkH,
    illum:il.fraction,phase:il.phase,freeWins,moonWins,freeH,cls,dim,
    moonrise:mc.ups[0]||null,moonset:mc.downs[0]||null};}

const CLSLT={ideal:'Puiki',part:'Gera iš dalies',poor:'Trumpas langas',bad:'Netinkama',none:'Be astronominės tamsos'};
const CLSB={ideal:'b-ideal',part:'b-part',poor:'b-poor',bad:'b-bad',none:'b-none'};

/* ============ ORAI (Open-Meteo, nemokama, be rakto) ============ */
const Weather={data:null,aod:null,fetchedAt:0,loc:'',
  async load(lat,lon,force){
    const key=lat.toFixed(2)+','+lon.toFixed(2);
    if(!force&&this.data&&this.loc===key&&Date.now()-this.fetchedAt<45*60000)return this.data;
    const u='https://api.open-meteo.com/v1/forecast?latitude='+lat+'&longitude='+lon+
      '&hourly=temperature_2m,dewpoint_2m,relative_humidity_2m,cloudcover,cloudcover_low,cloudcover_mid,cloudcover_high,windspeed_10m,windgusts_10m,visibility&forecast_days=8&timezone=auto';
    const r=await fetch(u); if(!r.ok)throw new Error('weather');
    this.data=await r.json(); this.fetchedAt=Date.now(); this.loc=key;
    try{ const ua='https://air-quality-api.open-meteo.com/v1/air-quality?latitude='+lat+'&longitude='+lon+
      '&hourly=aerosol_optical_depth&forecast_days=5&timezone=auto';
      const ra=await fetch(ua); if(ra.ok)this.aod=await ra.json(); }catch(e){this.aod=null;}
    return this.data;},
  at(t){ // valandiniai duomenys artimiausiai valandai
    if(!this.data)return null;
    const H=this.data.hourly, iso=new Date(t); iso.setMinutes(0,0,0);
    const tz=this.data.utc_offset_seconds*1000;
    const local=new Date(iso.getTime()+tz).toISOString().slice(0,13)+':00';
    const i=H.time.indexOf(local); if(i<0)return null;
    const aod=(()=>{if(!this.aod)return null;const j=this.aod.hourly.time.indexOf(local);
      return j>=0?this.aod.hourly.aerosol_optical_depth[j]:null;})();
    return {t:H.temperature_2m[i],td:H.dewpoint_2m[i],rh:H.relative_humidity_2m[i],
      cc:H.cloudcover[i],cl:H.cloudcover_low[i],cm:H.cloudcover_mid[i],ch:H.cloudcover_high[i],
      ws:H.windspeed_10m[i],wg:H.windgusts_10m[i],vis:H.visibility?H.visibility[i]:null,aod};},
  nightAvg(n){ // vid. per tamsos langą
    if(!n.darkStart)return null;
    const samples=[];
    for(let t=n.darkStart.getTime();t<=n.darkEnd.getTime();t+=3600000){
      const w=this.at(new Date(t)); if(w)samples.push(w);}
    if(!samples.length)return null;
    const avg=k=>samples.reduce((s,w)=>s+(w[k]??0),0)/samples.length;
    const o={t:avg('t'),td:avg('td'),rh:avg('rh'),cl:avg('cl'),cm:avg('cm'),ch:avg('ch'),ws:avg('ws')};
    o.aod=(()=>{const a=samples.map(s=>s.aod).filter(x=>x!=null);return a.length?a.reduce((s,x)=>s+x,0)/a.length:null;})();
    o.eff=0.55*o.cl+0.30*o.cm+0.15*o.ch;
    return o;}};
function cloudColor(c){return c<=15?'var(--good)':c<=40?'var(--warn)':c<=70?'var(--poor)':'var(--bad)';}
function nightScore(n,w){ // 0-10 stebėjimo indeksas
  if(n.cls==='none')return {v:0,txt:'nėra tamsos'};
  const darkF={ideal:1,part:0.7,poor:0.45,bad:0.15}[n.cls];
  if(!w)return {v:Math.round(darkF*10),txt:'be orų prognozės'};
  let clear=(100-w.eff)/100;
  let transp=1; if(w.rh>92)transp-=0.18; if((w.t-w.td)<1.5)transp-=0.15;
  if(w.aod!=null&&w.aod>0.25)transp-=0.12; if(w.ws>32)transp-=0.1;
  const v=Math.max(0,Math.min(10,Math.round(darkF*clear*Math.max(.3,transp)*10)));
  return {v,txt:null};}
function scoreColor(v){return v>=7?'var(--good)':v>=5?'var(--warn)':v>=3?'var(--poor)':'var(--bad)';}

function nightFor(date,off=0){
  const d=new Date(date); d.setDate(d.getDate()+off); d.setHours(12,0,0,0);
  const k=App.loc.lat.toFixed(2)+','+App.loc.lon.toFixed(2)+':'+d.toDateString();
  if(!App.nightsCache[k])App.nightsCache[k]=nightInfo(d,App.loc.lat,App.loc.lon);
  return App.nightsCache[k];}
function toast(msg,ms=2600){const t=document.getElementById('toast');t.textContent=msg;t.style.display='block';
  clearTimeout(t._h);t._h=setTimeout(()=>t.style.display='none',ms);}

/* Objekto matomumas šią naktį */
function objTonight(o,n){
  if(!n.darkStart)return null;
  const f=t=>altazFromRaDec(o.ra,o.dec,t,App.loc.lat,App.loc.lon).alt*DEG;
  let maxAlt=-90,maxT=null;
  const step=12*60000;
  for(let t=n.darkStart.getTime();t<=n.darkEnd.getTime();t+=step){
    const a=f(new Date(t)); if(a>maxAlt){maxAlt=a;maxT=new Date(t);}}
  const c20=crossings(new Date(n.darkStart.getTime()-6*3600000),new Date(n.darkEnd.getTime()+6*3600000),10,f,20);
  // tranzitas (kulminacija): kada vietinis žvaigždinis laikas = RA
  const d0=toDays(n.darkStart);
  let dH=norm(o.ra-sidereal(d0,App.loc.lon)); // rad iki tranzito
  const transit=new Date(n.darkStart.getTime()+dH/TAU*86164090);
  const solarMid=new Date((n.sunset&&n.sunrise)?(n.sunset.getTime()+n.sunrise.getTime())/2:(n.darkStart.getTime()+n.darkEnd.getTime())/2);
  const peak=Math.abs(transit-solarMid)<45*60000&&transit>n.darkStart&&transit<n.darkEnd;
  return {maxAlt,maxT,transit,peak,rise20:c20.ups[0]||null,set20:c20.downs.find(x=>x>(c20.ups[0]||0))||null};}

  else{
    const w=wn||nowW;

      <div class="stat"><div class="v" style="color:${cloudColor(w.eff??w.cc)}">${Math.round(w.eff??w.cc)}%</div><div class="k">Debesuotumas naktį (svert.)</div></div>
      <div class="stat"><div class="v">${Math.round(w.cl)}/${Math.round(w.cm)}/${Math.round(w.ch)}%</div><div class="k">Žemi / vid. / aukšti debesys</div></div>

function planetsHTML(n){
  const now=new Date(); let out='';
  for(const p of PLANETS){
    const pos=planetRaDec(p,now);
    const aa=altazFromRaDec(pos.ra,pos.dec,now,App.loc.lat,App.loc.lon);
    const t0=new Date(now); t0.setHours(12,0,0,0); if(now.getHours()<12)t0.setDate(t0.getDate()-1);
    const t1=new Date(t0.getTime()+DAYMS);
    const f=t=>{const q=planetRaDec(p,t);return altazFromRaDec(q.ra,q.dec,t,App.loc.lat,App.loc.lon).alt*DEG;};
    const c=crossings(t0,t1,15,f,0);
    const vis=n.darkStart?(f(n.darkStart)>10||f(n.darkEnd)>10||(c.ups[0]&&c.ups[0]>n.darkStart&&c.ups[0]<n.darkEnd)):aa.alt>0;
    out+=`<div class="obj-row" onclick="openPlanet('${p.id}')">
      <div class="obj-ico">${{mer:'☿',ven:'♀',mar:'♂',jup:'♃',sat:'♄',ura:'♅',nep:'♆'}[p.id]}</div>
      <div class="obj-main"><div class="t">${p.name} <span class="muted small">${pos.mag.toFixed(1)}ᵐ</span>
        ${vis?'<span class="badge b-acc">matoma naktį</span>':''}</div>
      <div class="s">teka ${fmtT(c.ups[0])} · leidžiasi ${fmtT(c.downs[0])} · dabar ${Math.round(aa.alt*DEG)}° aukštyje</div></div></div>`;}
  return out;}
let _recoCache={k:'',v:null};
function recoList(n){
  if(!n.darkStart)return [];
  const k=App.loc.lat.toFixed(2)+App.loc.lon.toFixed(2)+(n.darkStart?n.darkStart.getTime():0);
  if(_recoCache.k===k)return _recoCache.v;
  const moonBad=!n.dim&&n.freeH<1.5;
  const r=DSO.filter(o=>o.mag!=null&&o.mag<=10.8).map(o=>{
    const t=objTonight(o,n); if(!t||t.maxAlt<18)return null;
    let s=t.maxAlt/90*48+(10.5-Math.min(10.5,o.mag))*4.6+(t.peak?17:0)-(o.diff-1)*3;
    if(moonBad&&(o.type==='GX'||o.type==='EN'||o.type==='RN'||o.type==='SNR'))s-=22;
    return {o,t,s};}).filter(Boolean).sort((a,b)=>b.s-a.s);
  _recoCache={k,v:r}; return r;}
function recoHTML(n){
  const list=recoList(n).slice(0,12);
  if(!list.length)return '<p class="empty">Šiąnakt nėra tinkamos tamsos arba objektų virš horizonto.</p>';
  return list.map(({o,t})=>`<div class="obj-row" onclick="openObj('${o.id}')">
    <div class="obj-ico">${esc(o.id.replace('NGC','N'))}</div>
    <div class="obj-main"><div class="t">${esc(o.name||o.id)} ${t.peak?'<span class="badge b-gold">★ metų pikas</span>':''}
      ${t.maxAlt>60?'<span class="badge b-acc">aukštai</span>':''}</div>
    <div class="s">${TYPES[o.type]||o.type} · ${CONLT[o.con]||o.con} · ${o.mag}ᵐ · maks. ${Math.round(t.maxAlt)}° ${fmtT(t.maxT)}</div></div>
    <div class="obj-side">virš 20°<br>${fmtT(t.rise20)}–${fmtT(t.set20)}</div></div>`).join('');}
function watchHTML(n){
  if(!App.watch.length)return '<p class="empty">Sąrašas tuščias. Pridėkite objektų iš katalogo arba žvaigždėlapio.</p>';
  return App.watch.map(id=>{const o=DSOIDX[id];if(!o)return '';
    const t=n.darkStart?objTonight(o,n):null;
    return `<div class="obj-row"><div class="obj-ico" onclick="openObj('${o.id}')">${esc(o.id.replace('NGC','N'))}</div>
    <div class="obj-main" onclick="openObj('${o.id}')"><div class="t">${esc(o.name||o.id)}${o.alt?` <span class="alt">${o.alt.join(' · ')}</span>`:''}</div>
    <div class="s">${t?(t.maxAlt>10?`maks. ${Math.round(t.maxAlt)}° apie ${fmtT(t.maxT)}`:'šiąnakt žemai/nematomas'):'—'}</div></div>
    <button class="btn sm" onclick="locateObj('${o.id}')">⊕ Danguje</button></div>`;}).join('');}
function renderHourly(n){
  const box=document.getElementById('hourlyTonight'); if(!box||!n.sunset)return;
  const start=new Date(n.sunset.getTime()-3600000), end=new Date((n.sunrise||n.darkEnd||start).getTime()+3600000);
  let rows='';
  for(let t=start.getTime();t<=end.getTime();t+=3600000){
    const w=Weather.at(new Date(t)); if(!w)continue;
    const dk=n.darkStart&&t>=n.darkStart.getTime()&&t<=n.darkEnd.getTime();
    const mu=moonAlt(new Date(t),App.loc.lat,App.loc.lon)>0;
    rows+=`<tr style="${dk?'background:rgba(39,64,107,.18)':''}"><td>${fmtT(new Date(t))}${dk?' ✦':''}</td>
      <td><span class="cl" style="background:${cloudColor(w.cc)}22;color:${cloudColor(w.cc)}">${w.cc}</span></td>
      <td class="small">${w.cl}/${w.cm}/${w.ch}</td><td>${w.t.toFixed(0)}°</td><td>${w.td.toFixed(0)}°</td>
      <td>${Math.round(w.ws)}</td><td>${mu?moonEmoji(n.phase):'—'}</td></tr>`;}
  if(rows)box.innerHTML=`<table class="wx"><tr><th>Val.</th><th>☁%</th><th>ž/v/a</th><th>T</th><th>Rasa</th><th>Vėjas</th><th>Mėn.</th></tr>${rows}</table>`;}

function renderCal(){
  const v=document.getElementById('v-cal');
  if(!App.calMonth){App.calMonth=new Date();App.calMonth.setDate(1);}
  const M=App.calMonth, today=new Date();
  let html=`<div class="card"><div class="cal-head">
    <button class="btn sm" onclick="calNav(-1)">‹</button>
    <h2 style="flex:1;text-align:center">${M.toLocaleDateString('lt-LT',{month:'long',year:'numeric'})}</h2>
    <button class="btn sm" onclick="calNav(1)">›</button></div>
    <div class="legend"><span><i class="q-ideal"></i>Puiki</span><span><i class="q-part"></i>Iš dalies</span>
    <span><i class="q-poor"></i>Trumpas langas</span><span><i class="q-bad"></i>Netinkama</span><span><i class="q-none"></i>Be tamsos</span></div>
    <div class="cal">`;
  for(const d of ['Pr','An','Tr','Kt','Pn','Št','Sk'])html+=`<div class="dow">${d}</div>`;
  const first=new Date(M), pad=(first.getDay()+6)%7;
  first.setDate(1-pad);
  for(let i=0;i<42;i++){
    const d=new Date(first); d.setDate(first.getDate()+i);
    if(i===35&&d.getMonth()!==M.getMonth())break;
    const out=d.getMonth()!==M.getMonth();
    const n=nightFor(d,0);
    const isToday=d.toDateString()===today.toDateString();
    // mini juosta: 17:00–08:00 ašis
    const ax0=new Date(d);ax0.setHours(17,0,0,0); const axLen=15*3600000;
    const px=t=>Math.max(0,Math.min(100,((t-ax0)/axLen)*100));
    let bar='';
    if(n.darkStart){bar+=`<span class="dark" style="left:${px(n.darkStart)}%;right:${100-px(n.darkEnd)}%"></span>`;

/* ============ ŽVAIGŽDĖLAPIS ============ */
/* Laisvai valdomas vaizdas: centras (cAz,cAlt) + matymo laukas fov (laipsniais).
   Stereografinė projekcija aplink žiūrėjimo centrą, kaip Stellarium. */
const Sky={stars:null,lines:null,names:null,offMin:0,
  cAz:Math.PI,cAlt:Math.PI/2-0.002,fov:195,  // startas: visas dangaus skliautas nuo zenito
  sel:null,hits:[],loaded:false,raf:0,
  magBoost:0,telrad:false,stars8Loaded:false,_upgrading:false,
  start(){ loadSkyData().then(()=>drawSky()); drawSky(); renderSkyInfo();
    clearInterval(this._iv); this._iv=setInterval(()=>{
      if(document.getElementById('v-sky').classList.contains('act'))drawSky();},60000);},
  stop(){ clearInterval(this._iv); this._iv=null; }};
const FOV_MIN=2, FOV_MAX=200;
const SKY_SRC='https://raw.githubusercontent.com/ofrohn/d3-celestial/master/data/';
const parseStars=s=>{const a=s.features.map(f=>{const[lo,la]=f.geometry.coordinates;
    return {ra:(lo<0?lo+360:lo)*RAD,dec:la*RAD,mag:f.properties.mag};});
  a.sort((x,y)=>x.mag-y.mag); return a;};
/* priartinus giliai — fone atsisiunčiamas tankesnis katalogas iki ~8.5m */
async function upgradeStars(){
  if(Sky.stars8Loaded||Sky._upgrading)return;
  Sky._upgrading=true;
  try{const r=await fetch(SKY_SRC+'stars.8.json'); if(!r.ok)throw 0;
    Sky.stars=parseStars(await r.json()); Sky.stars8Loaded=true; drawSky();
  }catch(e){} Sky._upgrading=false;}
async function loadSkyData(){
  if(Sky.loaded)return;
  const msg=document.getElementById('skymsg');
  msg.style.display='block'; msg.textContent='Kraunamas žvaigždžių katalogas…';
  const SRC=SKY_SRC;
  try{
    const sf=App.settings.stars8?'stars.8.json':'stars.6.json';
    const [s,l,nm]=await Promise.all([
      fetch(SRC+sf).then(r=>r.json()),
      fetch(SRC+'constellations.lines.json').then(r=>r.json()),
      fetch(SRC+'constellations.json').then(r=>r.json())]);
    Sky.stars=parseStars(s);
    Sky.stars8Loaded=App.settings.stars8;
    Sky.lines=l.features.map(f=>({id:f.id,seg:f.geometry.coordinates.map(line=>line.map(([lo,la])=>[(lo<0?lo+360:lo)*RAD,la*RAD]))}));
    Sky.names=nm.features.map(f=>{const[lo,la]=f.geometry.coordinates;
      return {id:f.id,ra:(lo<0?lo+360:lo)*RAD,dec:la*RAD};});
    Sky.loaded=true; msg.style.display='none';
  }catch(e){msg.textContent='Nepavyko atsisiųsti žvaigždžių katalogo (reikia interneto). Rodomi tik deep sky objektai, planetos ir Mėnulis.';}
  drawSky();}
function skyDate(){return new Date(Date.now()+Sky.offMin*60000);}

/* Ryškio ribos pagal mastelį — atitolinus tik ryškiausios, artinant atsiranda daugiau.
   magBoost — vartotojo slankiklis „daugiau žvaigždžių". */
function starMagLimit(){
  const cap=Sky.stars8Loaded?8.5:6.6;
  const lim=7.7-Sky.fov*0.033+Sky.magBoost;
  return Math.max(2.7,Math.min(cap,lim));}
function dsoMagLimit(){
  return Sky.fov>120?6.3:Sky.fov>70?8.2:Sky.fov>35?10.5:99;}

/* ---- DSO vizualai: priartinus piešiami tikro kampinio dydžio simboliai ---- */
function hex2rgba(h,a){const n=parseInt(h.slice(1),16);
  return `rgba(${n>>16&255},${n>>8&255},${n&255},${a})`;}
function seedRnd(str){let h=2166136261;
  for(let i=0;i<str.length;i++){h^=str.charCodeAt(i);h=Math.imul(h,16777619);}
  return ()=>{h=Math.imul(h^h>>>15,2246822507);h=Math.imul(h^h>>>13,3266489909);
    return ((h^=h>>>16)>>>0)/4294967296;};}
function drawDSOVisual(x,o,p,r,col){
  const rnd=seedRnd(o.id);
  const blob=(cx,cy,rr,a)=>{const g=x.createRadialGradient(cx,cy,0,cx,cy,rr);
    g.addColorStop(0,hex2rgba(col,a));g.addColorStop(.55,hex2rgba(col,a*.45));g.addColorStop(1,hex2rgba(col,0));
    x.fillStyle=g;x.beginPath();x.arc(cx,cy,rr,0,TAU);x.fill();};
  if(o.type==='GX'){ // elipsė su ryškiu branduoliu
    const ang=rnd()*Math.PI, ratio=.3+rnd()*.3;
    x.save();x.translate(p[0],p[1]);x.rotate(ang);x.scale(1,ratio);
    blob(0,0,r,.42); x.restore();
    blob(p[0],p[1],r*.18,.8);
  } else if(o.type==='EN'||o.type==='RN'||o.type==='SNR'){ // netaisyklingas švytintis debesėlis
    const k=o.type==='SNR'?5:3;
    for(let i=0;i<k;i++){const a=rnd()*TAU,d=rnd()*r*.45;
      blob(p[0]+Math.cos(a)*d,p[1]+Math.sin(a)*d,r*(.45+rnd()*.4),.16);}
    if(o.type==='SNR'){x.strokeStyle=hex2rgba(col,.4);x.lineWidth=1;
      x.beginPath();x.arc(p[0],p[1],r*.8,0,TAU);x.stroke();}
  } else if(o.type==='PN'){ // diskelis su žiedu
    blob(p[0],p[1],r,.5);
    x.strokeStyle=hex2rgba(col,.75);x.lineWidth=Math.max(1,r*.12);
    x.beginPath();x.arc(p[0],p[1],r*.6,0,TAU);x.stroke();
  } else if(o.type==='GC'){ // tankėjantis į centrą žvaigždžių kamuolys
    blob(p[0],p[1],r,.35);
    x.fillStyle='#EDF1FF';
    const n=Math.min(90,25+r);
    for(let i=0;i<n;i++){const a=rnd()*TAU,d=rnd()*rnd()*r*.9;
      const sx=p[0]+Math.cos(a)*d,sy=p[1]+Math.sin(a)*d;
      x.beginPath();x.arc(sx,sy,.5+rnd()*.7,0,TAU);x.fill();}
  } else if(o.type==='OC'||o.type==='AST'||o.type==='SC'){ // pabirusios žvaigždutės
    x.strokeStyle=hex2rgba(col,.3);x.setLineDash([4,4]);x.lineWidth=1;
    x.beginPath();x.arc(p[0],p[1],r,0,TAU);x.stroke();x.setLineDash([]);
    x.fillStyle='#DDE6FB';
    const n=Math.min(45,10+r*.5);
    for(let i=0;i<n;i++){const a=rnd()*TAU,d=Math.sqrt(rnd())*r*.92;
      const sx=p[0]+Math.cos(a)*d,sy=p[1]+Math.sin(a)*d;
      x.beginPath();x.arc(sx,sy,.6+rnd()*1.1,0,TAU);x.fill();}
  } else if(o.type==='DN'){ // tamsusis ūkas — tamsi dėmė su pilku kontūru
    const g=x.createRadialGradient(p[0],p[1],0,p[0],p[1],r);
    g.addColorStop(0,'rgba(2,3,8,.85)');g.addColorStop(.7,'rgba(2,3,8,.55)');g.addColorStop(1,'rgba(2,3,8,0)');
    x.fillStyle=g;x.beginPath();x.arc(p[0],p[1],r,0,TAU);x.fill();
    x.strokeStyle='rgba(126,135,159,.4)';x.setLineDash([3,4]);x.lineWidth=1;
    x.beginPath();x.arc(p[0],p[1],r*.85,0,TAU);x.stroke();x.setLineDash([]);
  } else if(o.type==='DS'){ // dviguba žvaigždė
    x.fillStyle='#F4F6FF';
    x.beginPath();x.arc(p[0]-r*.3,p[1],2.2,0,TAU);x.fill();
    x.beginPath();x.arc(p[0]+r*.3,p[1]+r*.15,1.7,0,TAU);x.fill();
  } else blob(p[0],p[1],r,.4);}

function drawSky(){
  const cv=document.getElementById('sky'), wrap=document.getElementById('skywrap');
  const Wc=wrap.clientWidth, Hc=Math.min(Wc, window.innerHeight-230);
  const dpr=window.devicePixelRatio||1;
  cv.width=Wc*dpr; cv.height=Hc*dpr; cv.style.height=Hc+'px';
  const x=cv.getContext('2d'); x.scale(dpr,dpr);
  const W=Wc,H=Hc;
  const t=skyDate(), lat=App.loc.lat, lon=App.loc.lon;
  document.getElementById('skytime').textContent=
    t.toLocaleTimeString('lt-LT',{hour:'2-digit',minute:'2-digit'})
    +(Sky.offMin?` (${Sky.offMin>0?'+':''}${Math.round(Sky.offMin/60*10)/10}h)`:'')
    +(Sky.fov<150?` · ${Sky.fov<10?Sky.fov.toFixed(1):Math.round(Sky.fov)}°`:'');
  const sa=sunAlt(t,lat,lon)*DEG;
  x.fillStyle=sa>-6?'#15203A':sa>-12?'#0B1226':sa>-18?'#070C19':'#04060D';
  x.fillRect(0,0,W,H);

  /* projekcija aplink žiūrėjimo centrą */
  const a0=Sky.cAlt, z0=Sky.cAz;
  const sinA0=Math.sin(a0), cosA0=Math.cos(a0);
  const fovR=Sky.fov*RAD;
  const S=(Math.min(W,H)/2)/(2*Math.tan(fovR/4)); // ekrano pusė = fov/2
  const maxC=Math.min(Math.PI*0.62,fovR*0.78);    // matomumo kūgis
  const cosMaxC=Math.cos(maxC);
  const PA=(alt,az)=>{ // iš horizonto koordinačių
    const dz=az-z0;
    const cosc=sinA0*Math.sin(alt)+cosA0*Math.cos(alt)*Math.cos(dz);
    if(cosc<cosMaxC)return null;
    const k=2/(1+cosc);
    const px=k*Math.cos(alt)*Math.sin(dz);
    const py=k*(cosA0*Math.sin(alt)-sinA0*Math.cos(alt)*Math.cos(dz));
    return [W/2+px*S, H/2-py*S, alt];};
  const P=(()=>{ // sparti versija: žvaigždžių laikas ir platumos trig — iš anksto
    const lst=sidereal(toDays(t),lon), sphi=Math.sin(lat*RAD), cphi=Math.cos(lat*RAD);
    return (ra,dec)=>{
      const Hh=lst-ra, cH=Math.cos(Hh);
      const sdec=Math.sin(dec), cdec=Math.cos(dec);
      const alt=Math.asin(sphi*sdec+cphi*cdec*cH);
      if(alt<-0.55)return null; // giliai po horizontu nerodome
      const az=Math.atan2(Math.sin(Hh),cH*sphi-(sdec/cdec)*cphi)+Math.PI;
      return PA(alt,az);};})();
  const dimGround=p=>{x.globalAlpha=p[2]<0?0.28:1;};

  /* aukščio apskritimai 30/60 ir horizontas */
  const ring=(alt,style,wd)=>{x.strokeStyle=style;x.lineWidth=wd;x.beginPath();let st=false;
    for(let az=0;az<=360;az+=2){const p=PA(alt,az*RAD);
      if(!p){st=false;continue;} st?x.lineTo(p[0],p[1]):(x.moveTo(p[0],p[1]),st=true);}
    x.stroke();};
  ring(30*RAD,'rgba(42,59,97,.4)',.7); ring(60*RAD,'rgba(42,59,97,.4)',.7);
  ring(0,'#3A5080',1.6);
  /* kryptys ant horizonto */
  x.fillStyle='#94A1C3';x.font='12px Space Grotesk';x.textAlign='center';
  const dirs=[['Š',0],['ŠR',45],['R',90],['PR',135],['P',180],['PV',225],['V',270],['ŠV',315]];
  for(const[d,az]of dirs){const p=PA(-0.5*RAD,az*RAD);if(p)x.fillText(d,p[0],p[1]+12);}
  x.textAlign='left';

  /* žvaigždynų linijos — visada, tai orientavimosi karkasas */
  if(Sky.lines){x.strokeStyle='rgba(122,150,205,.36)';x.lineWidth=1;
    for(const c of Sky.lines)for(const seg of c.seg){let started=false;x.beginPath();
      for(const[ra,dec]of seg){const p=P(ra,dec);
        if(!p){started=false;continue;}
        if(!started){x.moveTo(p[0],p[1]);started=true;}else x.lineTo(p[0],p[1]);}
      x.stroke();}}
  /* ekliptika */
  x.strokeStyle='rgba(242,200,121,.3)';x.lineWidth=.8;x.beginPath();let st=false;
  for(let L=0;L<=360;L+=3){const q=eclToEq(L*RAD,0);const p=P(q.ra,q.dec);
    if(!p){st=false;continue;} if(!st){x.moveTo(p[0],p[1]);st=true;}else x.lineTo(p[0],p[1]);}
  x.stroke();

  /* žvaigždės — kiekis pagal mastelį (masyvas surikiuotas pagal ryškį) */
  if(Sky.stars){const lim=starMagLimit();
    for(const s of Sky.stars){ if(s.mag>lim)break;
      const p=P(s.ra,s.dec); if(!p)continue;
      dimGround(p);
      const r=Math.min(4.3,Math.max(.55,.7+(lim-s.mag)*.5));
      x.beginPath();x.arc(p[0],p[1],r,0,TAU);
      x.fillStyle=s.mag<1.6?'#FFFFFF':s.mag<3?'#EDF1FF':'#C2CEEC';x.fill();}
    x.globalAlpha=1;}

  Sky.hits=[];
  /* DSO — ryškio filtras pagal mastelį; watchlistas ir pasirinktas — visada.
     Priartinus objektai piešiami tikro kampinio dydžio su savo vizualu. */
  const dlim=dsoMagLimit();
  for(const o of DSO){
    const inWatch=App.watch.includes(o.id), isSel=Sky.sel&&Sky.sel.kind==='dso'&&Sky.sel.id===o.id;
    if((effMag(o)>dlim||!skyShown(o))&&!inWatch&&!isSel)continue;
    const p=P(o.ra,o.dec);if(!p)continue;
    dimGround(p);
    const col=o.type==='GX'?'#E08AC0':o.type==='GC'?'#F2C879':(o.type==='OC'||o.type==='AST'||o.type==='SC')?'#8FB8E8':o.type==='DN'?'#7E879F':'#7BD9C0';
    const pr=Math.min(Math.min(W,H)*.42,(o.size/120)*RAD*S); // pikselių spindulys pagal kampinį dydį
    if(pr>7){ drawDSOVisual(x,o,p,pr,col); }
    else{
      x.strokeStyle=col;x.lineWidth=1.2;x.beginPath();
      if(o.type==='DN')x.setLineDash([2,3]);
      if(o.type==='GX'){x.ellipse(p[0],p[1],5,2.6,.6,0,TAU);}else
      if(o.type==='OC'||o.type==='AST'||o.type==='SC'){x.rect(p[0]-4,p[1]-4,8,8);}else
      {x.arc(p[0],p[1],4,0,TAU);}
      x.stroke();x.setLineDash([]);}
    Sky.hits.push({x:p[0],y:p[1],id:o.id,kind:'dso'});
    if(effMag(o)<=5.2||(Sky.fov<70&&effMag(o)<=8.5)||Sky.fov<25||inWatch||isSel){x.fillStyle=col;x.font='10px IBM Plex Sans';
      x.fillText(o.id,p[0]+Math.max(6,pr*.7),p[1]-Math.max(5,pr*.7));}
    x.globalAlpha=1;}
  /* planetos */
  for(const pl of PLANETS){const c=planetRaDec(pl,t);const p=P(c.ra,c.dec);if(!p)continue;
    dimGround(p);
    x.fillStyle='#FFE9A8';x.beginPath();x.arc(p[0],p[1],4.5,0,TAU);x.fill();
    x.font='11px Space Grotesk';x.fillText(pl.name,p[0]+7,p[1]+4);
    Sky.hits.push({x:p[0],y:p[1],id:pl.id,kind:'pl'});x.globalAlpha=1;}
  /* Mėnulis */
  {const md=moonCoords(toDays(t));const p=P(md.ra,md.dec);
   if(p){dimGround(p);const il=moonIllum(t);
     x.fillStyle='#EDEFF6';x.beginPath();x.arc(p[0],p[1],8,0,TAU);x.fill();
     x.fillStyle='#9AA6C8';x.font='11px Space Grotesk';x.fillText('Mėnulis '+Math.round(il.fraction*100)+'%',p[0]+11,p[1]+4);
     x.globalAlpha=1;}}
  /* žvaigždynų pavadinimai */
  if(Sky.names){x.fillStyle='rgba(148,161,195,.55)';x.font=(Sky.fov<60?'11px':'10px')+' Space Grotesk';x.textAlign='center';
    for(const nm of Sky.names){const p=P(nm.ra,nm.dec);if(!p||p[2]<0.03)continue;
      x.fillText((CONLT[nm.id]||nm.id).toUpperCase(),p[0],p[1]);}
    x.textAlign='left';}
  /* pasirinkto objekto žiedas */
  if(Sky.sel){let p=null;
    if(Sky.sel.kind==='dso'){const o=DSOIDX[Sky.sel.id];if(o)p=P(o.ra,o.dec);}
    else{const pl=PLANETS.find(q=>q.id===Sky.sel.id);if(pl){const c=planetRaDec(pl,t);p=P(c.ra,c.dec);}}
    if(p){const ph=(Date.now()/700)%1;
      x.strokeStyle='#F2C879';x.lineWidth=2;
      x.beginPath();x.arc(p[0],p[1],12+ph*6,0,TAU);x.globalAlpha=1-ph*.7;x.stroke();x.globalAlpha=1;
      x.beginPath();x.arc(p[0],p[1],10,0,TAU);x.lineWidth=1.4;x.stroke();
      cancelAnimationFrame(Sky.raf);Sky.raf=requestAnimationFrame(()=>{
        if(document.getElementById('v-sky').classList.contains('act'))drawSky();});}}
  /* Telrad ieškiklis — standartiniai 0.5° / 2° / 4° žiedai ekrano centre */
  if(Sky.telrad){
    x.strokeStyle='rgba(255,82,82,.95)';
    for(const dD of [0.5,2,4]){
      const rr=2*S*Math.tan(dD*RAD/4); // kampinis spindulys = dD/2
      x.lineWidth=dD===4?1.8:1.3;
      x.beginPath();x.arc(W/2,H/2,rr,0,TAU);x.stroke();
      if(rr>16&&rr<Math.min(W,H)*.6){x.fillStyle='rgba(255,82,82,.8)';x.font='9px Space Grotesk';
        x.fillText(dD+'°',W/2+rr*.71+3,H/2-rr*.71-3);}}
    x.fillStyle='rgba(255,82,82,.95)';
    x.beginPath();x.arc(W/2,H/2,1.4,0,TAU);x.fill();}
  /* priartinus giliai — fone pasikrauna tankesnis žvaigždžių katalogas */
  if(Sky.loaded&&!Sky.stars8Loaded&&Sky.fov<35)upgradeStars();
}

/* ---- pasirinkimas + info kortelė ---- */
function skySelect(id,kind){Sky.sel={id,kind};renderSkyInfo();drawSky();}
function skyDeselect(){Sky.sel=null;renderSkyInfo();drawSky();}
function renderSkyInfo(){
  const el=document.getElementById('skyinfo'); if(!el)return;
  if(!Sky.sel){el.style.display='none';return;}
  const t=skyDate(); let title='',sub='',pos='',moreFn='';
  if(Sky.sel.kind==='dso'){const o=DSOIDX[Sky.sel.id]; if(!o){el.style.display='none';return;}
    title=`${o.id}${o.name?' — '+o.name:''}${o.alt?' ('+o.alt.join(', ')+')':''}`;
    sub=`${TYPES[o.type]||o.type} · ${CONLT[o.con]||o.con} · ${o.mag!=null?o.mag+'ᵐ':'foto'} · ${o.size}′`;
    const aa=altazFromRaDec(o.ra,o.dec,t,App.loc.lat,App.loc.lon);
    if(aa.alt>0)pos=`${Math.round(aa.alt*DEG)}° aukštyje · ${azName(aa.az)}`;
    else{const f=tt=>altazFromRaDec(o.ra,o.dec,tt,App.loc.lat,App.loc.lon).alt*DEG;
      const c=crossings(t,new Date(t.getTime()+DAYMS),10,f,0);
      pos=`po horizontu${c.ups[0]?' · pateka ~'+fmtT(c.ups[0]):''}`;}
    moreFn=`openObj('${o.id}')`;}
  else{const p=PLANETS.find(q=>q.id===Sky.sel.id); if(!p){el.style.display='none';return;}
    const c=planetRaDec(p,t), aa=altazFromRaDec(c.ra,c.dec,t,App.loc.lat,App.loc.lon);
    title=p.name; sub=`planeta · ${c.mag.toFixed(1)}ᵐ · ${c.dist.toFixed(1)} AV`;
    pos=aa.alt>0?`${Math.round(aa.alt*DEG)}° aukštyje · ${azName(aa.az)}`:'po horizontu';
    moreFn=`openPlanet('${p.id}')`;}
  el.innerHTML=`<button class="x" onclick="skyDeselect()">✕</button>
    <div class="t">${esc(title)}</div>
    <div class="s">${esc(sub)}</div>
    <div class="s" style="color:var(--gold)">${esc(pos)}</div>
    <div class="b">
      <button class="btn sm" onclick="skyCenterSel()">⌖ Centruoti</button>
      <button class="btn sm" onclick="${moreFn}">ℹ Plačiau</button>
    </div>`;
  el.style.display='block';}
function skyCenterSel(zoom){
  if(!Sky.sel)return; const t=skyDate(); let aa=null;
  if(Sky.sel.kind==='dso'){const o=DSOIDX[Sky.sel.id];if(o)aa=altazFromRaDec(o.ra,o.dec,t,App.loc.lat,App.loc.lon);}
  else{const p=PLANETS.find(q=>q.id===Sky.sel.id);
    if(p){const c=planetRaDec(p,t);aa=altazFromRaDec(c.ra,c.dec,t,App.loc.lat,App.loc.lon);}}
  if(!aa)return;
  Sky.cAz=aa.az; Sky.cAlt=Math.max(-25*RAD,Math.min(89.7*RAD,aa.alt));
  if(zoom!==false)Sky.fov=Math.min(Sky.fov,38);
  drawSky();}

/* „Rodyti danguje" — perkelia tiesiai prie objekto, prizoomina, parodo kortelę */
function locateObj(id){
  closeModal(); switchTab('v-sky');
  Sky.sel={id,kind:'dso'}; Sky.fov=36;
  const o=DSOIDX[id];
  const aa=altazFromRaDec(o.ra,o.dec,skyDate(),App.loc.lat,App.loc.lon);
  if(aa.alt*DEG<-25){ // giliai po horizontu — rodome jo azimutą prie horizonto
    Sky.cAz=aa.az; Sky.cAlt=-8*RAD;
    const f=t=>altazFromRaDec(o.ra,o.dec,t,App.loc.lat,App.loc.lon).alt*DEG;
    const c=crossings(new Date(),new Date(Date.now()+DAYMS),10,f,0);
    toast(`${o.id} dabar giliai po horizontu${c.ups[0]?' — pateka ~'+fmtT(c.ups[0]):''}`);
  } else { Sky.cAz=aa.az; Sky.cAlt=Math.max(-25*RAD,Math.min(89.7*RAD,aa.alt)); }
  renderSkyInfo(); drawSky();}
function locatePlanet(id){
  closeModal(); switchTab('v-sky');
  Sky.sel={id,kind:'pl'}; Sky.fov=36;
  const p=PLANETS.find(q=>q.id===id);
  const c=planetRaDec(p,skyDate());
  const aa=altazFromRaDec(c.ra,c.dec,skyDate(),App.loc.lat,App.loc.lon);
  Sky.cAz=aa.az; Sky.cAlt=Math.max(-25*RAD,Math.min(89.7*RAD,aa.alt));
  if(aa.alt<=0)toast(`${p.name} dabar po horizontu`);
  renderSkyInfo(); drawSky();}
function azName(az){const d=((az*DEG)%360+360)%360;const n=['Š','ŠR','R','PR','P','PV','V','ŠV'];return n[Math.round(d/45)%8];}

const TYPEGROUPS=[['tGX','Galaktikos'],['tNEB','Ūkai (EN/RN/SNR)'],['tCL','Spiečiai'],['tPN','Planetiškieji ū.'],['tDN','Tamsieji ūkai']];

/* ---- lietimas: stumdymas, mastelis, bakstelėjimas ---- */
(()=>{const cv=document.getElementById('sky');let drag=null,pinch=null,moved=false;
  const clampAlt=a=>Math.max(-28*RAD,Math.min(89.7*RAD,a));
  cv.addEventListener('pointerdown',e=>{cv.setPointerCapture(e.pointerId);
    if(drag&&drag.id!==e.pointerId){pinch={a:drag,b:{id:e.pointerId,x:e.offsetX,y:e.offsetY},f:Sky.fov};}
    else drag={id:e.pointerId,x:e.offsetX,y:e.offsetY,az:Sky.cAz,alt:Sky.cAlt};moved=false;});
  cv.addEventListener('pointermove',e=>{
    if(pinch){const p=e.pointerId===pinch.a.id?pinch.a:pinch.b;p.x=e.offsetX;p.y=e.offsetY;
      const d=Math.hypot(pinch.a.x-pinch.b.x,pinch.a.y-pinch.b.y);
      if(!pinch.d0)pinch.d0=d;else{Sky.fov=Math.max(FOV_MIN,Math.min(FOV_MAX,pinch.f*pinch.d0/d));drawSky();}moved=true;return;}
    if(drag&&e.pointerId===drag.id){
      const dx=e.offsetX-drag.x, dy=e.offsetY-drag.y;
      if(Math.abs(dx)+Math.abs(dy)>5)moved=true;
      const H=cv.clientHeight||1;
      const k=(Sky.fov*RAD)/H;                       // rad per pikselį
      const cd=Math.max(0.25,Math.cos(Sky.cAlt));    // az greitėja arti zenito
      Sky.cAz=drag.az-dx*k/cd;
      Sky.cAlt=clampAlt(drag.alt+dy*k);
      drawSky();}});
  const up=e=>{if(!moved&&drag){const mx=e.offsetX,my=e.offsetY;let best=null,bd=22*22;
      for(const h of Sky.hits){const d=(h.x-mx)**2+(h.y-my)**2;if(d<bd){bd=d;best=h;}}
      if(best)skySelect(best.id,best.kind); else skyDeselect();}
    drag=null;pinch=null;};
  cv.addEventListener('pointerup',up);cv.addEventListener('pointercancel',()=>{drag=null;pinch=null;});
  cv.addEventListener('wheel',e=>{e.preventDefault();
    Sky.fov=Math.max(FOV_MIN,Math.min(FOV_MAX,Sky.fov*(e.deltaY<0?0.88:1.14)));drawSky();},{passive:false});
  document.getElementById('skySlider').addEventListener('input',e=>{Sky.offMin=+e.target.value;drawSky();renderSkyInfo();});
  document.getElementById('skyNow').addEventListener('click',()=>{Sky.offMin=0;document.getElementById('skySlider').value=0;drawSky();renderSkyInfo();});
  document.getElementById('skyAll').addEventListener('click',()=>{
    Sky.cAz=Math.PI;Sky.cAlt=Math.PI/2-0.002;Sky.fov=195;drawSky();});
  document.getElementById('skyTelrad').addEventListener('click',e=>{
    Sky.telrad=!Sky.telrad;
    e.currentTarget.classList.toggle('on',Sky.telrad);
    if(Sky.telrad&&Sky.fov>60)Sky.fov=40; // ieškiklis prasmingas tik priartinus
    drawSky();});
  document.getElementById('skyStarBoost').addEventListener('input',e=>{
    Sky.magBoost=+e.target.value;
    if(Sky.magBoost>0.8&&!Sky.stars8Loaded)upgradeStars();
    drawSky();});
  document.getElementById('skyLayers').addEventListener('click',()=>{
    const el=document.getElementById('skylayers');
    if(el.style.display==='block'){el.style.display='none';return;}
    renderSkyLayers(); el.style.display='block';});
  window.addEventListener('resize',()=>{if(document.getElementById('v-sky').classList.contains('act'))drawSky();});
})();

/* ============ ŽURNALAS (sesijos + įrašai) ============ */
const Journal={
  sessions:[], stats:{}, loaded:false,
  async load(){ if(this.loaded)return;
    const keys=await Store.list('sessions:');
    const out=[];
    for(const k of keys){const s=await Store.get(k);if(s)out.push(s);}
    out.sort((a,b)=>new Date(b.start)-new Date(a.start));
    this.sessions=out; this.rebuild(); this.loaded=true;},
  rebuild(){ const st={};
    for(const s of this.sessions)for(const e of (s.entries||[])){
      const o=st[e.obj]||(st[e.obj]={n:0,sum:0,nr:0,last:0});
      o.n++; if(e.rating){o.sum+=e.rating;o.nr++;}
      const t=new Date(e.time).getTime(); if(t>o.last)o.last=t;}
    for(const k in st)st[k].avg=st[k].nr?st[k].sum/st[k].nr:0;
    this.stats=st;},
  async save(s){ await Store.set('sessions:'+s.id,s); this.rebuild(); }
};
function objName(id){
  if(id.startsWith('PL:')){const p=PLANETS.find(x=>x.id===id.slice(3));return p?p.name:id;}
  const o=DSOIDX[id]; return o?(o.id+' — '+o.name):id;}

/* ---- sesijos srautas ---- */
async function startSession(){
  if(App.session){toast('Sesija jau vyksta');return;}
  openModal(`<button class="x" onclick="closeModal()">✕</button>
    <p class="eyebrow">Nauja stebėjimo sesija</p><h2>Pradėti stebėjimą</h2>
    <p class="small muted" id="ssGps">Nustatoma GPS padėtis…</p>
    <div class="kv" id="ssMeta"></div>
    <div class="btnrow"><button class="btn primary" id="ssGo" disabled>▶ Pradėti sesiją</button></div>`);
  let lat=App.loc.lat,lon=App.loc.lon,name=App.loc.name,gps=false;
  const fill=()=>{
    const w=App.weatherOK?Weather.at(new Date()):null;
    document.getElementById('ssGps').textContent=gps
      ?`GPS: ${lat.toFixed(4)}, ${lon.toFixed(4)}`
      :`GPS nepasiekiamas — naudojama įrašyta vieta (${name})`;
    document.getElementById('ssMeta').innerHTML=`
      <b>Laikas</b><span>${new Date().toLocaleString('lt-LT')}</span>
      <b>Vieta</b><span>${name} · ${lat.toFixed(3)}, ${lon.toFixed(3)}</span>
      <b>Bortle</b><span>${App.loc.bortle} — ${BORTLE[App.loc.bortle]}</span>
      <b>Oras</b><span>${w?`${fmtN(w.t)}°C, rasos t. ${fmtN(w.td)}°C, debesys ${Math.round(w.cc)}%, vėjas ${Math.round(w.ws)} km/h`:'nėra duomenų'}</span>`;
    const b=document.getElementById('ssGo'); b.disabled=false;
    b.onclick=async()=>{
      const w2=App.weatherOK?Weather.at(new Date()):null;
      App.session={id:'s'+Date.now(),start:new Date().toISOString(),end:null,
        lat,lon,place:name,bortle:App.loc.bortle,
        weather:w2?{t:w2.t,td:w2.td,rh:w2.rh,cc:w2.cc,cl:w2.cl,cm:w2.cm,ch:w2.ch,ws:w2.ws}:null,
        entries:[]};
      await Journal.save(App.session);
      if(gps&&(Math.abs(lat-App.loc.lat)>0.02||Math.abs(lon-App.loc.lon)>0.02)){
        App.loc={...App.loc,lat,lon}; App.nightsCache={}; saveAll(); initWeather(true);}
      closeModal(); updateSessBanner(); switchTab('v-log'); toast('Sesija pradėta — giedro dangaus!');};
  };
  if(navigator.geolocation){
    navigator.geolocation.getCurrentPosition(p=>{
      lat=p.coords.latitude;lon=p.coords.longitude;gps=true;
      name=App.loc.name+' (GPS)'; fill();
    },()=>fill(),{enableHighAccuracy:true,timeout:8000});
    setTimeout(()=>{if(document.getElementById('ssGo')&&document.getElementById('ssGo').disabled)fill();},8500);
  } else fill();}

async function endSession(){
  if(!App.session)return;
  const s=App.session; s.end=new Date().toISOString();
  await Journal.save(s);
  if(!Journal.sessions.find(x=>x.id===s.id))Journal.sessions.unshift(s);
  App.session=null; updateSessBanner();
  const dur=Math.round((new Date(s.end)-new Date(s.start))/60000);
  openModal(`<button class="x" onclick="closeModal()">✕</button>
    <p class="eyebrow">Sesija baigta</p><h2>Vakaro suvestinė</h2>
    <div class="kv">
      <b>Trukmė</b><span>${Math.floor(dur/60)} val. ${dur%60} min.</span>
      <b>Vieta</b><span>${esc(s.place)}</span>
      <b>Objektų įrašyta</b><span>${s.entries.length}</span>
      ${s.entries.length?`<b>Objektai</b><span>${s.entries.map(e=>esc(objName(e.obj).split(' — ')[0])).join(', ')}</span>`:''}
    </div>
    <div class="btnrow"><button class="btn primary" onclick="closeModal();switchTab('v-log')">Žiūrėti žurnalą</button></div>`);
  renderLog();}

function updateSessBanner(){
  const b=document.getElementById('sessBanner');
  if(App.session){b.classList.add('act');
    const n=App.session.entries.length;
    document.getElementById('sessInfo').textContent=
      `Sesija nuo ${fmtT(new Date(App.session.start))} · ${n} įraš${n===1?'as':(n%10>=2&&n%10<=9&&(n%100<11||n%100>19)?'ai':'ų')}`;
  } else b.classList.remove('act');}

/* ---- objekto įrašas ---- */
let _entry=null;
function startEntry(id){
  if(!App.session){
    openModal(`<button class="x" onclick="closeModal()">✕</button><h2>Sesija nepradėta</h2>
      <p class="muted">Stebėjimo įrašai pridedami prie aktyvios sesijos — taip automatiškai užfiksuojama vieta, laikas ir oro sąlygos.</p>
      <div class="btnrow"><button class="btn primary" onclick="closeModal();startSession()">▶ Pradėti sesiją</button></div>`);
    return;}
  const now=new Date(); const w=App.weatherOK?Weather.at(now):null;
  _entry={obj:id,time:now.toISOString(),rating:0,photo:null};
  let desc='';
  if(id.startsWith('PL:')){const p=PLANETS.find(x=>x.id===id.slice(3));
    if(p){const pos=planetRaDec(p,now),aa=altazFromRaDec(pos.ra,pos.dec,now,App.session.lat,App.session.lon);
      desc=`Planeta · ${pos.mag.toFixed(1)}ᵐ · ${aa.alt>0?Math.round(aa.alt*DEG)+'° aukštyje ('+azName(aa.az)+')':'po horizontu'}`;}}
  else{const o=DSOIDX[id];
    if(o){const aa=altazFromRaDec(o.ra,o.dec,now,App.session.lat,App.session.lon);
      desc=`${TYPES[o.type]||o.type} · ${CONLT[o.con]||o.con} · ${o.mag!=null?o.mag+'ᵐ':'—'} · ${o.size}′ · ${aa.alt>0?Math.round(aa.alt*DEG)+'° aukštyje ('+azName(aa.az)+')':'po horizontu'}`;}}
  openModal(`<button class="x" onclick="closeModal()">✕</button>
    <p class="eyebrow">Stebėjimo įrašas</p><h2>${esc(objName(id))}</h2>
    <p class="small muted">${esc(desc)}</p>
    <div class="kv">
      <b>Laikas</b><span>${now.toLocaleString('lt-LT')}</span>
      <b>Vieta</b><span>${esc(App.session.place)} · Bortle ${App.session.bortle}</span>
      <b>Oras</b><span>${w?`${fmtN(w.t)}°C, debesys ${Math.round(w.cc)}%, RH ${Math.round(w.rh)}%`:(App.session.weather?`${fmtN(App.session.weather.t)}°C (sesijos pradžioje)`:'—')}</span>
    </div>
    <label class="small muted" style="display:block;margin-top:.6rem">Instrumentas / okuliaras</label>
    <input class="inp" id="enInstr" placeholder="pvz., 8&quot; Dobsonas, 25 mm okuliaras" value="${esc(App.settings.lastInstr||'')}">
    <label class="small muted" style="display:block;margin-top:.6rem">Pastabos ir įžvalgos</label>
    <textarea class="inp" id="enNotes" rows="4" placeholder="Ką matėte? Detalės, forma, spalva, palydovai…"></textarea>
    <label class="small muted" style="display:block;margin-top:.6rem">Įvertinimas</label>
    <div class="stars" id="enStars">${[1,2,3,4,5].map(i=>`<span data-r="${i}">☆</span>`).join('')}</div>
    <label class="small muted" style="display:block;margin-top:.6rem">Nuotrauka (nebūtina)</label>
    <input type="file" id="enPhoto" accept="image/*" class="inp">
    <div id="enPrev" style="margin-top:.5rem"></div>
    <div class="btnrow"><button class="btn" onclick="closeModal()">Atšaukti</button>
    <button class="btn primary" onclick="saveEntry()">💾 Išsaugoti įrašą</button></div>`);
  document.getElementById('enStars').addEventListener('click',e=>{
    const r=+e.target.dataset.r; if(!r)return; _entry.rating=r;
    document.querySelectorAll('#enStars span').forEach(s=>s.textContent=+s.dataset.r<=r?'★':'☆');});
  document.getElementById('enPhoto').addEventListener('change',e=>{
    const f=e.target.files[0]; if(!f)return;
    const img=new Image(); img.onload=()=>{
      const cv=document.createElement('canvas'); const sc=Math.min(1,1000/Math.max(img.width,img.height));
      cv.width=Math.round(img.width*sc); cv.height=Math.round(img.height*sc);
      cv.getContext('2d').drawImage(img,0,0,cv.width,cv.height);
      _entry.photo=cv.toDataURL('image/jpeg',0.75);
      document.getElementById('enPrev').innerHTML=`<img src="${_entry.photo}" style="max-width:100%;border-radius:10px">`;
      URL.revokeObjectURL(img.src);};
    img.src=URL.createObjectURL(f);});}

async function saveEntry(){
  if(!App.session||!_entry)return;
  _entry.instr=document.getElementById('enInstr').value.trim();
  _entry.notes=document.getElementById('enNotes').value.trim();
  if(_entry.instr){App.settings.lastInstr=_entry.instr;saveAll();}
  App.session.entries.push(_entry);
  const ok=await Journal.save(App.session);
  if(ok===false&&_entry.photo){ // per didelė nuotrauka saugyklai
    _entry.photo=null; await Journal.save(App.session);
    toast('Įrašas išsaugotas, bet nuotrauka netilpo į saugyklą');}
  else toast('Įrašas išsaugotas ✓');
  _entry=null; closeModal(); updateSessBanner();
  if(document.getElementById('v-log').classList.contains('act'))renderLog();}

/* ---- žurnalo vaizdas ---- */
async function renderLog(){
  await Journal.load();
  const el=document.getElementById('v-log'); let h='';
  if(App.session){
    const s=App.session;
    h+=`<div class="card" style="border-color:rgba(242,200,121,.45)">
      <p class="eyebrow">● Vyksta sesija</p>
      <h2>Nuo ${fmtT(new Date(s.start))} · ${esc(s.place)}</h2>
      <p class="small muted">Bortle ${s.bortle}${s.weather?` · ${fmtN(s.weather.t)}°C, debesys ${Math.round(s.weather.cc)}%`:''}</p>`;
    if(s.entries.length){h+=`<hr class="hr">`;
      for(const e of s.entries)h+=entryRow(e);}
    h+=`<div class="btnrow"><button class="btn" onclick="switchTab('v-cat')">+ Objektas iš katalogo</button>
      <button class="btn primary" onclick="endSession()">⏹ Baigti sesiją</button></div></div>`;
  } else {
    h+=`<div class="card"><h2>Stebėjimų žurnalas</h2>
      <p class="muted small">Pradėjus sesiją automatiškai užfiksuojama GPS vieta, laikas, oro sąlygos ir Bortle klasė. Tuomet iš katalogo ar žvaigždėlapio spauskite „Įrašyti stebėjimą".</p>
      <div class="btnrow"><button class="btn primary" onclick="startSession()">▶ Pradėti sesiją</button></div></div>`;}
  /* mano objektai */
  const ids=Object.keys(Journal.stats);
  h+=`<div class="card"><h2>Mano stebėti objektai <span class="sub">${ids.length}</span></h2>`;
  if(!ids.length)h+=`<p class="muted small">Kol kas tuščia — pirmieji įrašai atsiras čia.</p>`;
  else{
    ids.sort((a,b)=>Journal.stats[b].last-Journal.stats[a].last);
    for(const id of ids){const st=Journal.stats[id];
      h+=`<div class="obj-row" onclick="${id.startsWith('PL:')?`openPlanet('${id.slice(3)}')`:`openObj('${id}')`}">
        <div class="t">${esc(objName(id))}</div>
        <div class="s">${st.n} k. · pask. ${new Date(st.last).toLocaleDateString('lt-LT')}${st.nr?` · vid. ${st.avg.toFixed(1)} ★`:''}</div></div>`;}}
  h+=`</div>`;
  /* sesijų istorija */
  const past=Journal.sessions.filter(s=>!(App.session&&s.id===App.session.id));
  h+=`<div class="card"><h2>Sesijų istorija <span class="sub">${past.length}</span></h2>`;
  if(!past.length)h+=`<p class="muted small">Užbaigtos sesijos bus rodomos čia.</p>`;
  else for(const s of past){
    const d=new Date(s.start);
    const dur=s.end?Math.round((new Date(s.end)-d)/60000):null;
    h+=`<div class="obj-row" onclick="openSession('${s.id}')">
      <div class="t">${d.toLocaleDateString('lt-LT')} · ${esc(s.place)}</div>
      <div class="s">${fmtT(d)}${s.end?'–'+fmtT(new Date(s.end)):''}${dur!=null?` (${Math.floor(dur/60)}v ${dur%60}m)`:''} · ${s.entries.length} obj. · Bortle ${s.bortle}</div></div>`;}
  h+=`</div>`;
  el.innerHTML=h;}

function entryRow(e){
  return `<div style="padding:.45rem 0;border-bottom:1px solid rgba(255,255,255,.06)">
    <div style="display:flex;justify-content:space-between;gap:.5rem">
      <b>${esc(objName(e.obj))}</b><span class="small muted">${fmtT(new Date(e.time))}</span></div>
    ${e.rating?`<div class="small" style="color:var(--gold)">${'★'.repeat(e.rating)}${'☆'.repeat(5-e.rating)}</div>`:''}
    ${e.instr?`<div class="small muted">${esc(e.instr)}</div>`:''}
    ${e.notes?`<div class="small" style="margin-top:.15rem">${esc(e.notes)}</div>`:''}
    ${e.photo?`<img src="${e.photo}" style="max-width:100%;border-radius:10px;margin-top:.4rem">`:''}</div>`;}

function openSession(id){
  const s=Journal.sessions.find(x=>x.id===id); if(!s)return;
  const d=new Date(s.start);
  let h=`<button class="x" onclick="closeModal()">✕</button>
    <p class="eyebrow">Sesija</p><h2>${d.toLocaleDateString('lt-LT')} · ${esc(s.place)}</h2>
    <div class="kv">
      <b>Laikas</b><span>${fmtT(d)}${s.end?' – '+fmtT(new Date(s.end)):''}</span>
      <b>Vieta</b><span>${s.lat.toFixed(3)}, ${s.lon.toFixed(3)}</span>
      <b>Bortle</b><span>${s.bortle} — ${BORTLE[s.bortle]}</span>
      ${s.weather?`<b>Oras</b><span>${fmtN(s.weather.t)}°C, rasos t. ${fmtN(s.weather.td)}°C, debesys ${Math.round(s.weather.cc)}%, vėjas ${Math.round(s.weather.ws)} km/h</span>`:''}
    </div>`;
  if(s.entries.length){h+=`<hr class="hr">`;for(const e of s.entries)h+=entryRow(e);}
  else h+=`<p class="muted small" style="margin-top:.6rem">Įrašų nėra.</p>`;
  h+=`<div class="btnrow"><button class="btn" onclick="deleteSession('${s.id}')">🗑 Ištrinti</button></div>`;
  openModal(h);}

async function deleteSession(id){
  if(!confirm('Ištrinti šią sesiją ir visus jos įrašus?'))return;
  await Store.del('sessions:'+id);
  Journal.sessions=Journal.sessions.filter(s=>s.id!==id);
  Journal.rebuild(); closeModal(); renderLog(); toast('Sesija ištrinta');}

/* ============ NUSTATYMAI ============ */
function openSettings(){
  openModal(`<button class="x" onclick="closeModal()">✕</button>
    <p class="eyebrow">Nustatymai</p><h2>Vieta ir programa</h2>
    <label class="small muted">Vietos pavadinimas</label>
    <input class="inp" id="stName" value="${esc(App.loc.name)}">
    <div style="display:flex;gap:.5rem">
      <div style="flex:1"><label class="small muted">Platuma</label>
        <input class="inp" id="stLat" type="number" step="0.0001" value="${App.loc.lat}"></div>
      <div style="flex:1"><label class="small muted">Ilguma</label>
        <input class="inp" id="stLon" type="number" step="0.0001" value="${App.loc.lon}"></div>
    </div>
    <div class="btnrow" style="margin:.5rem 0 .8rem">
      <button class="btn sm" id="stGps">📍 Nustatyti pagal GPS</button>
    </div>
    <label class="small muted">Dangaus tamsumas (Bortle klasė)</label>
    <select class="inp" id="stBortle">${[1,2,3,4,5,6,7,8,9].map(b=>
      `<option value="${b}" ${b===App.loc.bortle?'selected':''}>${b} — ${BORTLE[b]}</option>`).join('')}</select>
    <hr class="hr">
    <label style="display:flex;align-items:center;gap:.6rem;font-size:.88rem;margin:.4rem 0">
      <input type="checkbox" id="stNotif" ${App.settings.notif?'checked':''} style="width:auto">
      Pranešimas apie tinkamą rytojaus naktį (atidarius programą)</label>
    <label style="display:flex;align-items:center;gap:.6rem;font-size:.88rem;margin:.4rem 0">
      <input type="checkbox" id="stStars8" ${App.settings.stars8?'checked':''} style="width:auto">
      Daugiau žvaigždžių žemėlapyje (iki ~8.5ᵐ; lėtesnis krovimas)</label>
    <p class="small muted" style="margin-top:.6rem">Duomenų saugykla: ${
      {cloud:'Claude saugykla (sinchronizuojama)',local:'naršyklės localStorage (šiame įrenginyje)',mem:'tik atmintis — uždarius prarandama!'}[Store.mode]}</p>
    <div class="btnrow"><button class="btn primary" id="stSave">💾 Išsaugoti</button></div>`);
  document.getElementById('stGps').onclick=()=>{
    if(!navigator.geolocation){toast('GPS nepasiekiamas šioje naršyklėje');return;}
    toast('Nustatoma padėtis…');
    navigator.geolocation.getCurrentPosition(p=>{
      document.getElementById('stLat').value=p.coords.latitude.toFixed(4);
      document.getElementById('stLon').value=p.coords.longitude.toFixed(4);
      toast('GPS padėtis nustatyta ✓');
    },()=>toast('Nepavyko gauti GPS — įveskite ranka'),{enableHighAccuracy:true,timeout:9000});};
  document.getElementById('stSave').onclick=async()=>{
    const lat=parseFloat(document.getElementById('stLat').value),
          lon=parseFloat(document.getElementById('stLon').value);
    if(isNaN(lat)||isNaN(lon)||Math.abs(lat)>89||Math.abs(lon)>180){toast('Neteisingos koordinatės');return;}
    const wantNotif=document.getElementById('stNotif').checked;
    if(wantNotif&&!App.settings.notif)await enableNotif();
    else App.settings.notif=wantNotif;
    const s8=document.getElementById('stStars8').checked;
    if(s8!==App.settings.stars8){App.settings.stars8=s8;Sky.stars=null;Sky.loaded=false;}
    App.loc={name:document.getElementById('stName').value.trim()||'Mano vieta',
      lat,lon,bortle:+document.getElementById('stBortle').value};
    App.nightsCache={};
    document.getElementById('locName').textContent=App.loc.name;
    await saveAll(); closeModal(); toast('Išsaugota ✓');
    renderTonight(); initWeather(true);};}

async function enableNotif(){
  if(!('Notification' in window)){toast('Naršyklė nepalaiko pranešimų');App.settings.notif=false;return;}
  const p=await Notification.requestPermission();
  App.settings.notif=(p==='granted');
  if(p!=='granted')toast('Pranešimai neleisti naršyklės nustatymuose');}

function checkTomorrowNotif(){
  if(!App.settings.notif||!('Notification' in window)||Notification.permission!=='granted')return;
  if(!App.weatherOK)return;
  const n=nightFor(new Date(),1);
  const key=new Date(Date.now()+DAYMS).toDateString();
  if(App.settings.lastNotif===key)return;
  const w=Weather.nightAvg(n);
  const sc=nightScore(n,w);
  let body;
  if(sc.v>=7)body=`Rytojaus naktis puiki stebėjimams — indeksas ${sc.v}/10. ${n.cls==='ideal'?'Mėnulis netrukdys.':''}`;
  else if(sc.v>=5)body=`Rytojaus naktis vidutiniška (${sc.v}/10) — pasitikrinkite laiko langus.`;
  else body=`Rytojaus naktis nepalanki stebėjimams (${sc.v}/10).`;
  try{new Notification('Zenitas — rytojaus prognozė',{body,icon:'icon-192.png'});
    App.settings.lastNotif=key; saveAll();}catch(e){}}

/* ============ NAVIGACIJA / INIT ============ */
function switchTab(v){
  document.querySelectorAll('main .view').forEach(s=>s.classList.toggle('act',s.id===v));
  document.querySelectorAll('nav.tabs button').forEach(b=>b.classList.toggle('act',b.dataset.v===v));
  if(v==='v-tonight')renderTonight();
  else if(v==='v-cal')renderCal();
  else if(v==='v-sky'){Sky.start();}
  else if(v==='v-cat')renderCat();
  else if(v==='v-log')renderLog();
  if(v!=='v-sky')Sky.stop&&Sky.stop();}
document.querySelectorAll('nav.tabs button').forEach(b=>
  b.addEventListener('click',()=>switchTab(b.dataset.v)));

document.getElementById('setBtn').addEventListener('click',openSettings);
document.getElementById('locChip').addEventListener('click',openSettings);
document.getElementById('locChip').addEventListener('keydown',e=>{if(e.key==='Enter')openSettings();});
document.getElementById('sessGoto').addEventListener('click',()=>switchTab('v-log'));
document.getElementById('redBtn').addEventListener('click',async()=>{
  document.documentElement.classList.toggle('red');
  App.settings.red=document.documentElement.classList.contains('red');
  await saveAll();
  toast(App.settings.red?'Naktinis režimas — akys pripras prie tamsos':'Įprastas režimas');});
document.getElementById('modal').addEventListener('click',e=>{
  if(e.target.id==='modal')closeModal();});

async function initWeather(force=false){
  try{ await Weather.load(App.loc.lat,App.loc.lon,force);
    App.weatherOK=true;
  }catch(e){ App.weatherOK=false; }
  const act=document.querySelector('main .view.act');
  if(act&&act.id==='v-tonight')renderTonight();
  if(act&&act.id==='v-cal')renderCal();
  if(App.weatherOK)checkTomorrowNotif();}

(async function init(){
  const [loc,watch,settings]=await Promise.all([Store.get('loc'),Store.get('watch'),Store.get('settings')]);
  if(loc)App.loc=loc;
  if(watch)App.watch=watch;
  if(settings)App.settings={...App.settings,...settings};
  if(App.settings.red)document.documentElement.classList.add('red');
  document.getElementById('locName').textContent=App.loc.name;
  /* nebaigta sesija po perkrovimo */
  Journal.load().then(()=>{
    const open=Journal.sessions.find(s=>!s.end);
    if(open&&Date.now()-new Date(open.start)<16*3600e3){App.session=open;updateSessBanner();}
  });
  renderTonight();
  initWeather();
  if('serviceWorker' in navigator&&location.protocol==='https:'){
    navigator.serviceWorker.register('sw.js').catch(()=>{});}
})();
</script>
</body>
